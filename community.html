<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Mirror Status</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .back-link { font-size: 13px; margin-bottom: 16px; display: inline-block; }
    .back-link a { color: var(--muted); }

    .meta-links { margin: 20px 0; display: flex; gap: 16px; flex-wrap: wrap; }
    .meta-links a {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; padding: 6px 14px;
      border: 1px solid var(--border); border-radius: 20px;
      background: var(--card-bg); color: var(--text);
      text-decoration: none; transition: 0.15s;
    }
    .meta-links a:hover { background: var(--info-bg); border-color: var(--info); }

    .fail-table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
    .fail-table th {
      text-align: left; padding: 8px 12px;
      background: var(--danger-bg); color: var(--danger);
      border-bottom: 2px solid var(--danger);
    }
    .fail-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .fail-table tr:hover { background: var(--bg); }
    .fail-table .repo-name { font-family: ui-monospace, SFMono-Regular, monospace; font-weight: 600; }
    .fail-table .err-msg { color: var(--danger); font-size: 12px; }
    .fail-table .diag-msg { color: var(--muted); font-size: 12px; }

    .section-title { font-size: 15px; font-weight: 600; margin: 24px 0 10px; }

    .progress-bar {
      width: 100%; height: 8px; background: var(--border); border-radius: 4px;
      margin-top: 12px; overflow: hidden; display: flex;
    }
    .progress-bar .bar-success { background: var(--success); }
    .progress-bar .bar-failed  { background: var(--danger); }
    .progress-bar .bar-skipped { background: var(--warn); }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-link"><a href="./">← 返回总览仪表盘</a></div>

    <div class="header">
      <h1 id="org-title">—</h1>
      <p class="subtitle" id="org-flow"></p>
    </div>

    <div id="stale-warning" class="stale-warning">⚠️ 数据已超过 36 小时未更新，可能已过期。</div>

    <div class="summary-cards" id="summary"></div>

    <div class="progress-bar" id="progress-bar"></div>

    <div class="meta-links" id="meta-links"></div>

    <div id="failed-section"></div>
    <div id="success-section"></div>

    <div class="footer" id="footer-info"></div>
  </div>

  <script src="community.js"></script>
</body>
</html>
