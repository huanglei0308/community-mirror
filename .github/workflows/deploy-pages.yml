name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'config/orgs.json'
  schedule:
    - cron: '27 2 * * *'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Update README from orgs.json
      run: |
        python3 << PYEOF
        import json, re

        with open("config/orgs.json") as f:
            config = json.load(f)

        rows = []
        for r in config["repos"]:
            src = r["source"]
            dst = r["destination"]
            rows.append(
                f"| {r['org']} | {src} | {dst} | @{r.get('contact', 'N/A')} "
                f"| [查看](https://github.com/{r['owner']}/sync-config#sync-status) |"
            )

        table = (
            "| 社区 | 源 | 目的 | 负责人 | 状态 |\\n"
            "|------|-----|------|--------|------|\\n"
            + "\\n".join(rows)
        )

        with open("README.md") as f:
            readme = f.read()

        pattern = r"<!-- COMMUNITY_TABLE_START -->.*<!-- COMMUNITY_TABLE_END -->"
        replacement = "<!-- COMMUNITY_TABLE_START -->\\n" + table + "\\n<!-- COMMUNITY_TABLE_END -->"
        new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

        with open("README.md", "w") as f:
            f.write(new_readme)
        print("README.md updated from orgs.json")
        PYEOF

    - name: Fetch community statuses and update README status section
      run: |
        pip install requests -q
        python3 << PYEOF
        import json, re, requests

        with open("config/orgs.json") as f:
            config = json.load(f)

        status_lines = []
        total_success = total_failed = total_repos = 0

        for r in config["repos"]:
            try:
                resp = requests.get(r["results_url"], timeout=30)
                if resp.status_code == 200:
                    d = resp.json()
                    s, f, t = d.get("success", 0), d.get("failed", 0), d.get("total", 0)
                    total_success += s; total_failed += f; total_repos += t
                    icon = "⚠️" if f > 0 else "✅"
                    status_lines.append(f"| {icon} {r['org']} | {t} | {s} | {f} | {d.get('skipped', 0)} |")
                else:
                    status_lines.append(f"| ❓ {r['org']} | - | - | - | - |")
            except Exception as e:
                status_lines.append(f"| ❓ {r['org']} | - | - | - | - |")

        overall = f"⚠️ **{total_failed} failed**" if total_failed else "✅ All synced"

        status_section = f"""**Overall:** {overall} | **{len(config['repos'])}** communities | **{total_repos}** repos

        | Community | Total | ✅ Synced | ❌ Failed | ⏭️ Skipped |
        |-----------|------:|----------:|----------:|-----------:|
        {chr(10).join(status_lines)}
        """

        with open("README.md") as f:
            readme = f.read()

        pattern = r"<!-- STATUS_TABLE_START -->.*<!-- STATUS_TABLE_END -->"
        replacement = "<!-- STATUS_TABLE_START -->\n" + status_section + "\n<!-- STATUS_TABLE_END -->"
        new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

        with open("README.md", "w") as f:
            f.write(new_readme)
        print("README status section updated")
        PYEOF

    - name: Commit updated README
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        if git diff --cached --quiet; then
          echo "No changes to README"
        else
          git commit -m "Auto-update community table from orgs.json [skip ci]"
          git push
        fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: public/
        publish_branch: gh-pages
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update dashboard [skip ci]'
